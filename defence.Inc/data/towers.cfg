# towers.cfg — 炮塔初始属性配置 / Tower initial stats configuration
#
# 格式 / Format (空格分隔 / space-separated):
#   name  range  damage  fire_rate  cost_wood  cost_stone  cost_metal  cost_material
#
# name      : 炮塔标识名（与代码中 TowerType 枚举对应）/ Tower name (matches TowerType enum)
# range     : 攻击射程（像素）/ Attack range in pixels
# damage    : 基础伤害值 / Base damage value
# fire_rate : 攻击冷却时间（秒，值越小攻速越快）/ Attack cooldown in seconds
# cost_*    : 建造费用，0 表示不消耗该资源 / Build cost (0 = not required)
#
# 修改此文件后重启游戏即可生效，无需重新编译代码。
# Changes here take effect after restarting the game — no recompilation needed.
# ─────────────────────────────────────────────────────────────────────────────
# name          range  dmg   cd    cW   cS   cM   cMat
