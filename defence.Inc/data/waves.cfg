# waves.cfg — 波次参数配置 / Wave parameters configuration
#
# 格式 / Format (空格分隔 / space-separated):
#   level  wave  enemy_count  spawn_interval
#
# level          : 关卡编号（1=石器时代，2=古代文明，3=科幻未来）
#                  Level number (1=Stone Age, 2=Ancient, 3=Sci-Fi)
# wave           : 波次编号（1-3）/ Wave number (1-3)
# enemy_count    : 该波生成的敌人总数 / Total enemies to spawn this wave
# spawn_interval : 每个敌人之间的生成间隔（秒）/ Seconds between each spawn
#
# 修改此文件后重启游戏即可生效，无需重新编译代码。
# Changes here take effect after restarting the game — no recompilation needed.
# ─────────────────────────────────────────────────────────────────────────────
# lvl  wave  count  interval
# ─── 关卡1：石器时代 / Level 1: Stone Age ─────────────────────────────────
1      1     5      2.0
1      2     10     1.5
1      3     15     1.0
# ─── 关卡2：古代文明 / Level 2: Ancient Civilization ──────────────────────
2      1     8      1.8
2      2     14     1.3
2      3     20     0.9
# ─── 关卡3：科幻未来 / Level 3: Sci-Fi Future ─────────────────────────────
3      1     12     1.5
3      2     18     1.2
3      3     25     0.8
