# sounds.cfg — 音效配置文件 / Sound effects configuration
# 格式 / Format:  name=filename
# name     : 代码中调用 audio_play(a, "name") 时使用的标识键
#            The key used when calling audio_play(a, "name") in code
# filename : assets/sounds/ 目录下的音频文件名（不含路径前缀）
#            Audio filename inside assets/sounds/ (no path prefix needed)
#
# 新增音效只需在此文件追加一行，无需修改或重新编译 C 代码
# To add a new sound: append a line here — no C code changes needed.
# ─────────────────────────────────────────────────────────────────

explosion=boom.wav
click=click.wav
hover=hover.wav
place=place.wav
upgrade=upgrade.wav
hit=hit.wav
victory=victory.wav
gameover=gameover.wav
